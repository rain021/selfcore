<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      min-height: 200px;
      background: #0f172a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #58E6FF, #0ea5e9);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #0f172a;
    }
    .title { font-size: 16px; font-weight: 700; }
    .subtitle { font-size: 10px; color: rgba(255,255,255,0.4); }
    .status-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(30,41,59,0.6); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .status-label { color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    .status-value { font-weight: 600; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot-green { background: #34d399; }
    .dot-red { background: #f87171; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 8px;
      background: rgba(30,41,59,0.6); margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .toggle-label { font-size: 12px; color: rgba(255,255,255,0.7); }
    .toggle-switch {
      width: 38px; height: 20px; border-radius: 10px;
      background: rgba(255,255,255,0.15); cursor: pointer;
      position: relative; transition: background 0.2s;
    }
    .toggle-switch.active { background: rgba(88,230,255,0.4); }
    .toggle-switch::after {
      content: ''; width: 16px; height: 16px; border-radius: 50%;
      background: #fff; position: absolute; top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle-switch.active::after { left: 20px; background: #58E6FF; }
    .link-btn {
      display: block; text-align: center; padding: 10px;
      background: rgba(88,230,255,0.1); border: 1px solid rgba(88,230,255,0.2);
      border-radius: 8px; color: #58E6FF; text-decoration: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .link-btn:hover { background: rgba(88,230,255,0.2); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <div>
      <div class="title">SelfCore</div>
      <div class="subtitle" id="subtitle">AI Context Bridge</div>
    </div>
  </div>

  <div class="status-row">
    <div>
      <div class="status-label" id="lbl-status">CONNECTION</div>
      <div class="status-value" id="conn-status"><span class="dot dot-red"></span>Checking...</div>
    </div>
  </div>

  <div class="status-row">
    <div>
      <div class="status-label" id="lbl-profile">ACTIVE PROFILE</div>
      <div class="status-value" id="profile-name">—</div>
    </div>
  </div>

  <div class="toggle-row">
    <div class="toggle-label" id="lbl-auto">Auto-inject on send</div>
    <div class="toggle-switch" id="auto-toggle"></div>
  </div>

  <a class="link-btn" id="open-editor" href="#">Open SelfCore Editor</a>

  <script src="popup.js"></script>
</body>
</html>
